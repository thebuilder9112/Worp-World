name: Sagittarius CI/CD

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

env:
  # Replace these default values with your own Google Cloud configuration if needed
  GCP_REGION: us-central1
  SERVICE_NAME: sagittarius-world

jobs:
  # 1. Continuous Integration (Verify Quality and Build)
  ci-build:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build

  # 2. Continuous Deployment (Build & Deploy to Google Cloud Run)
  cd-deploy:
    name: Continuous Deployment (Cloud Run)
    needs: ci-build
    # Only run deployment on pushes to primary main/master branches when secrets are configured
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Set up Google Cloud Authentication using Service Account Key
      # Requires the GCP_SA_KEY secret containing the Service Account JSON key.
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up Google Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Configure Docker to use Google Container Registry or Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # Build and Push Docker Image to GCR
      - name: Build and Push Container
        run: |
          IMAGE_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          LATEST_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest"
          
          docker build -t $IMAGE_TAG -t $LATEST_TAG .
          docker push $IMAGE_TAG
          docker push $LATEST_TAG

      # Deploy the image to Google Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--port=3000 --allow-unauthenticated'
